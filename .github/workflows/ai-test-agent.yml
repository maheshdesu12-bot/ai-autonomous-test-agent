name: AI Autonomous Test Agent

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:

  autonomous-test:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: [3.10, 3.11]

    steps:

    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        playwright install chromium

    - name: Start FastAPI test server
      run: |
        uvicorn server:app &
        sleep 5

    - name: Run Orchestrator Agent
      run: |
        python -m src.agent.orchestrator_agent

    - name: Upload Reports
      uses: actions/upload-artifact@v4
      with:
        name: ai-test-reports
        path: reports/

    - name: Upload Memory
      uses: actions/upload-artifact@v4
      with:
        name: ai-agent-memory
        path: memory/