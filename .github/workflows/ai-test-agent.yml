name: AI Autonomous Test Agent CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  ai-test:

    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:6
        ports:
          - 27017:27017
        options: >-
          --health-cmd="mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      MONGO_URI: mongodb://127.0.0.1:27017/agentdb

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Start FastAPI server
        run: |
          nohup uvicorn server:app --host 127.0.0.1 --port 8000 > uvicorn.log 2>&1 &
          sleep 5

      - name: Run Autonomous AI Test Agent
        run: |
          python -m src.agent.orchestrator_agent

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: |
            reports/
            uvicorn.log